<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxoUZTt3Vhx_5bkU-Wb9STL4n0cjDyDfBo-iwHo5n6jYOj0KtNE4ld2ZdBTvnmzo_k/exec" // <--- PEGA TU URL DE APPS SCRIPT AQUÍ

let activos = [];
let movimientos = [];

// FUNCION CRITICA: Carga los datos reales
async function fetchData() {
    try {
        // Configuramos el fetch para seguir la redirección de Google
        const response = await fetch(WEB_APP_URL, {
            method: "GET",
            mode: "cors", 
            redirect: "follow" // <--- ESTO ES VITAL PARA EL ERROR 302
        });

        if (!response.ok) throw new Error("Error en la red");

        const data = await response.json();
        activos = data.activos || [];
        movimientos = data.movimientos || [];
        
        console.log("¡Conexión exitosa desde GitHub!");
        renderAll();
    } catch (e) {
        console.error("Error detallado:", e);
    }
}    
// FUNCION CRITICA: Guarda datos en Sheets
async function saveToSheets(payload) {
    await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors', // Necesario para Apps Script
        body: JSON.stringify(payload)
    });
    setTimeout(fetchData, 1500); // Recarga datos después de guardar
}

// Modificación de tus funciones existentes para que guarden de verdad:
function saveActivo() {
    const payload = {
        metodo: "nuevoActivo",
        qr: document.getElementById('f-qr').value,
        modelo: document.getElementById('f-modelo').value,
        capacidad: document.getElementById('f-capacidad').value,
        obs: document.getElementById('f-obs').value
    };
    saveToSheets(payload);
    closeModal('modal-activo');
}

function saveMovimiento() {
    const payload = {
        metodo: "nuevoMovimiento",
        tipo: document.getElementById('f-tipo').value,
        activo: document.getElementById('f-activo-id').value,
        cliente: document.getElementById('f-cliente-id').value,
        chofer: document.getElementById('f-chofer').value,
        fecha: document.getElementById('f-fecha').value,
        failcode: document.getElementById('f-failcode').value
    };
    saveToSheets(payload);
    closeModal('modal-entrega');
}

// Iniciar la app cargando datos reales
window.onload = fetchData;

// ... (El resto de tus funciones de renderizado: renderDashboard, renderActivos, etc.)
</script>
